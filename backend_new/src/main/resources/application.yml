spring:
  application:
    name: univgroup-backend

  profiles:
    active: dev

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  # Jackson 설정
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# 서버 설정
server:
  port: 8080

# JWT 설정
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForJWTWhichIsVeryLongAndSecureAtLeast256Bits}
  expiration: ${JWT_EXPIRATION:86400000}       # 24시간 (밀리초)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7일 (밀리초)

# Google OAuth 설정
app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    additional-client-ids: ${GOOGLE_ADDITIONAL_CLIENT_IDS:}

# 로깅 설정
logging:
  level:
    root: INFO
    com.univgroup: DEBUG
    org.hibernate.SQL: DEBUG

---
# 개발 환경
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:univgroup;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

---
# 데모 환경
spring:
  config:
    activate:
      on-profile: demo

  datasource:
    url: jdbc:h2:mem:univgroup-demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

---
# 테스트 환경
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

---
# 프로덕션 환경
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: WARN
    com.univgroup: INFO
